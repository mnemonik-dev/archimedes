name: archimedes
channels:
  - conda-forge
dependencies:
  # Core toolchain
  - python=3.12
  - pip
  - uv          # Modern, fast Python package + tool installer (used for arc-canteen and dev tooling)
  - git
  - nodejs>=22  # Frontend toolchain (npm, npx). Required for `npm run lint`,
                # `npm run dev`, `npm run build` in ui/. Without this, devs
                # have to install Node separately and CI-vs-local parity
                # breaks (the ESLint gate runs in CI only).

  # Python deps installed via pip — pinned loosely; tighten in pyproject.toml as the project firms up.
  - pip:
      # --- Web backend ---
      - fastapi>=0.115
      - "starlette>=1.0.1"            # Pinned directly to close PYSEC-2026-161 (Host-header validation bypass); FastAPI's range can resolve to vulnerable 1.0.0 without this floor.
      - "uvicorn[standard]>=0.32"
      - sqlalchemy>=2.0
      - psycopg2-binary>=2.9          # PostgreSQL driver (binary wheel; no system pq needed)
      - alembic>=1.13                 # DB migrations
      - redis>=7.4.0                  # Redis client for live regime/state cache (aligned with backend/requirements.txt)
      - pydantic>=2.9
      - pydantic-settings>=2.5
      - python-dotenv>=1.0
      - "slowapi>=0.1.9"              # FastAPI rate-limiter — required by api/limiter.py + user_routes.py. CI installs from backend/requirements.txt; this keeps local dev parity.

      # --- Data + numerics ---
      - numpy>=1.26,<2.0              # Pin <2 until backtrader compatibility is verified
      - pandas>=2.2
      - scipy>=1.13
      - matplotlib>=3.8
      - seaborn>=0.13

      # --- Market data ---
      - yfinance>=0.2.40              # Historical + live equity/ETF/crypto data; for backtesting
      - requests>=2.32
      - aiohttp>=3.10

      # --- Backtesting (per backtrader-vs-vectorbt decision memo) ---
      - backtrader>=1.9.78            # Decision: v1 default. See docs/specs/backtrader-vs-vectorbt-decision-memo.md

      # --- LLM ---
      - anthropic>=0.40               # Claude API for strategy extraction + reasoning trace generation

      # --- On-chain / Web3 ---
      - web3>=7.0                     # Python EVM client; works with Arc (EVM-compatible)
      - eth-account>=0.13             # Local key management for testnet wallets
      - eth-utils>=5.0
      - cryptography>=42.0            # RSA sign/serialize for the oracle signer (backend/archimedes/chain/oracle_updater.py); mirrors backend/requirements.txt

      # --- AWS / S3 ---
      - boto3>=1.35                    # S3 artifact reads for KB pipeline output (embeddings, KG)

      # --- Paper ingestion (Q-fin corpus) ---
      - arxiv>=2.1                    # arxiv API client
      - pypdf>=4.3                    # PDF text extraction

      # --- Quality + tests ---
      - ruff>=0.6                     # Linter + formatter; configured at line length 120
      - pytest>=8.3
      - pytest-asyncio>=0.24
      - pytest-cov>=5.0
      - mypy>=1.11
      - "pip-audit>=2.7"              # Supply-chain CVE scanner — run `pip-audit` to check installed deps against the PyPI vulnerability DB. Not yet a CI gate; advisory only.

      # --- Dev convenience ---
      - ipython>=8.27
      - jupyter>=1.1                  # For exploratory strategy work
