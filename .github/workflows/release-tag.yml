# Release tag — fires on every push to main.
#
# If the push came from a merged PR, creates a semver annotated tag:
#
#   !version-release at END of PR title → major bump  (x.0.0)
#   !minor          at END of PR title → minor bump  (0.x.0)
#   anything else                      → patch bump  (0.0.x)
#
# **Title-only matching with end-of-string anchor.** Earlier versions of this
# workflow scanned `title + body` for the literal substring, which mis-fired
# when a PR DOCUMENTED the marker convention — e.g. PR #198 ("[docs] CLAUDE.md:
# KB pipeline provenance + bot release-tag conventions") incidentally contained
# the text "!version-release" in its body and was tagged v1.0.0 by mistake.
# Title-end matching prevents that: the marker has to be the EXPLICIT trailing
# token of the PR title, matching the documented convention in CLAUDE.md.
#
# Tags are created via the GitHub API (no git push, no checkout needed).
# First tag ever starts from v0.0.0 and bumps from there.
# Direct pushes to main (no associated PR) are skipped silently.

name: Release Tag

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    steps:
      - name: Create release tag
        uses: actions/github-script@v9
        with:
          script: |
            // 1. Find the merged PR for this commit.
            //    Prefer the commits→pulls API, but fall back to parsing the
            //    merge-commit message when the GITHUB_TOKEN lacks pull-requests
            //    read permission (common in orgs with restricted defaults).
            let merged;

            try {
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
              merged = prs.find(pr => pr.merged_at);
            } catch (err) {
              if (err.status === 403) {
                core.info('listPullRequestsAssociatedWithCommit returned 403 — falling back to commit-message parsing.');
              } else {
                throw err;
              }
            }

            // Fallback: parse PR number from the merge-commit message.
            // Squash merges look like "Title (#123)"; merge commits look like
            // "Merge pull request #123 from …".
            if (!merged) {
              const msg = context.payload.head_commit?.message ?? '';
              const prMatch = msg.match(/Merge pull request #(\d+)/) || msg.match(/\(#(\d+)\)/);
              if (prMatch) {
                const prNum = parseInt(prMatch[1], 10);
                try {
                  const { data: pr } = await github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNum,
                  });
                  if (pr.merged_at) merged = pr;
                } catch (e) {
                  // pulls.get also blocked — build a minimal object from the
                  // commit message so tagging can still proceed.
                  core.info(`pulls.get #${prNum} failed (${e.status ?? e.message}) — using commit message for bump detection.`);
                  merged = { number: prNum, title: msg.split('\n')[0], body: msg, merged_at: 'unknown' };
                }
              }
            }

            if (!merged) {
              core.info('No merged PR for this commit — skipping tag.');
              return;
            }

            // 2. Determine bump type from PR title (title-only; end-anchored).
            //    Matching only the END of the title prevents false positives
            //    where the marker text appears in body prose (e.g. docs PRs
            //    that document the convention). The marker must be the final
            //    non-whitespace token of the title — exactly the documented
            //    convention in CLAUDE.md.
            const title = merged.title ?? '';
            let bump = 'patch';
            if (/!version-release\s*$/.test(title))      bump = 'major';
            else if (/!minor\s*$/.test(title))            bump = 'minor';
            core.info(`PR #${merged.number}: "${title}" → ${bump} bump`);

            // 3. Find the latest semver tag (v0.0.0 format)
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const parsed = tags
              .filter(t => /^v\d+\.\d+\.\d+$/.test(t.name))
              .map(t => {
                const [major, minor, patch] = t.name.slice(1).split('.').map(Number);
                return { major, minor, patch };
              })
              .sort((a, b) => b.major - a.major || b.minor - a.minor || b.patch - a.patch);

            const cur = parsed[0] ?? { major: 0, minor: 0, patch: 0 };
            core.info(`Current: v${cur.major}.${cur.minor}.${cur.patch}`);

            // 4. Compute next version
            let { major, minor, patch } = cur;
            if      (bump === 'major') { major++;  minor = 0; patch = 0; }
            else if (bump === 'minor') {            minor++;  patch = 0; }
            else                       {                       patch++;  }
            const next = `v${major}.${minor}.${patch}`;

            // 5. Create annotated tag via GitHub API
            try {
              const tagObj = await github.rest.git.createTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: next,
                message: `${next}: ${merged.title} (#${merged.number})`,
                object: context.sha,
                type: 'commit',
                tagger: {
                  name: 'github-actions[bot]',
                  email: 'github-actions[bot]@users.noreply.github.com',
                  date: new Date().toISOString(),
                },
              });

              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${next}`,
                sha: tagObj.data.sha,
              });

              core.notice(`Tagged ${context.sha.slice(0, 7)} → ${next} (${bump} via PR #${merged.number})`);
            } catch (err) {
              if (err.status === 422) {
                core.warning(`Tag ${next} already exists — skipping. (Possible race between concurrent merges.)`);
              } else {
                throw err;
              }
            }
