# Quality gate — runs on every PR to main.
#
# Hard block:
#   backend-tests  — pytest unit suite (no DB/Redis required)
#
# Informational table (posted as PR comment):
#   ruff linter    — ruff check + ruff format --check
#   eslint         — npm run lint
#   coverage       — unit coverage vs 60% floor (agent PRs only)

name: Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend-tests:
    name: Backend — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install --quiet -r backend/requirements.txt "pytest>=8.3" "pytest-asyncio>=0.24" "pytest-cov>=5.0"
      - name: Test
        run: pytest -m "not integration" --tb=short -q

  lint-report:
    name: Lint — report table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet ruff

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci --quiet

      - name: ruff check
        id: ruff
        run: |
          if ruff check backend/archimedes && ruff format --check backend/archimedes; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=not passed" >> "$GITHUB_OUTPUT"
          fi

      - name: eslint
        id: eslint
        run: |
          if cd ui && npm run lint --silent; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=not passed" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fmt = r => r === 'passed' ? '✅ passed' : '❌ not passed';
            const ruff   = fmt('${{ steps.ruff.outputs.result }}');
            const eslint = fmt('${{ steps.eslint.outputs.result }}');

            const marker = '<!-- quality-gate-v1 -->';
            const body = [
              marker,
              '## Quality Gate',
              '',
              '| Check | Status |',
              '|---|---|',
              `| ruff linter (python) | ${ruff} |`,
              `| eslint (frontend) | ${eslint} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  coverage-gate:
    name: Backend — coverage (agent PRs only)
    if: github.event.pull_request.user.login == 't2o2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet -r backend/requirements.txt "pytest>=8.3" "pytest-asyncio>=0.24" "pytest-cov>=5.0"
      - run: pytest -m "not integration" --cov=archimedes --cov-fail-under=60 --tb=short -q
